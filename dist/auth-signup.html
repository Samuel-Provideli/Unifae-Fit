<!-- [ auth-signup ] start -->
<div class="auth-wrapper">
	<div class="auth-content text-center">
		<img src="assets/images/logo.png" alt="" class="img-fluid mb-4">
		<div class="card borderless">
			<div class="row align-items-center text-center">
				<div class="col-md-12">
					<div class="card-body">
						<h4 class="f-w-400">Cadastre-se</h4>
						<hr> <form action="index.html" method="GET">




						<div class="form-group mb-3">
							<label for="date">Digite seu nome completo:</label>
							<input type="text" class="form-control" id="Username" placeholder="Nome completo" maxlength="225" required>
						</div> <!--Nome para digitar-->


						<div class="form-group mb-3">
							<label for="date">Digite seu cpf:</label>
							<input type="tel" class="form-control" placeholder="000 000 000 00"  minlength="12" maxlength="14" pattern="(?:\d\s*){11}" title="Formato esperado: 000 000 000 00" required>


						</div> <!--Cpf para digitar-->


						<div class="form-group mb-3">
							<label for="date">Data de nascimento:</label>
							<input type="date" class="form-control" placeholder="Data nascimento" required>
						</div> <!--Data para digitar-->


						<div class="form-group mb-3">
							<label for="text">Numero de telefone:</label>

							<input type="tel" class="form-control" placeholder="55 12 1234-5678"  minlength="12" maxlength="16" pattern="[0-9]{2}\s[0-9]{2}\s[0-9]{4,5}-[0-9]{4}" title="Formato esperado: 55 19 91234-5678" required> <!--numero de telefone-->
						</div>

						<div class="form-group mb-3">
							<label for="date">Digite seu endereço:</label>
							<input type="text" class="form-control" placeholder="Endereço" maxlength="150" required>
						</div> <!--endereço-->

						
						<a href="index.html"><button class="btn btn-primary btn-block mb-4">Cadastre-se</button></a>



						<hr></form>
						<p class="mb-2">Already have an account? <a href="auth-signin.html" class="f-w-400">Signin</a></p>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>
<!-- [ auth-signup ] end -->
